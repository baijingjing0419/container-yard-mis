services:
  mysql:
    image: mysql:8.0
    container_name: yard-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ContainerTerminalDB
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./yard_mis_database.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - yard-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yard-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: ContainerTerminalDB
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DEBUG: "false"
      CORS_ORIGINS: "http://localhost:8080"
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - yard-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yard-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - yard-net

volumes:
  mysql_data:

networks:
  yard-net:
    driver: bridge
